name: reusable-callee

on:
  workflow_call:
    inputs:
      caller-frame:
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  bounded-callee:
    runs-on: ubuntu-latest
    steps:
      - name: Write bounded callee observation
        run: |
          mkdir -p evidence
          printf 'callee=workflow_call\ncaller_frame=%s\n' "${{ inputs.caller-frame }}" > evidence/reusable-callee.txt
      - name: Upload bounded callee artifact
        uses: actions/upload-artifact@v4
        with:
          name: reusable-callee-observation
          path: evidence/reusable-callee.txt
